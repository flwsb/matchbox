{% extends "base.html" %}
{% block title %}Fragebogen — {{ event.name }}{% endblock %}

{% block content %}
<div x-data="questionnaire()" x-init="init()">
    <!-- Progress Bar -->
    <div class="mb-progress-section">
        <div class="mb-progress-track">
            <div class="mb-progress-fill" :style="'width: ' + ((currentIndex + 1) / questions.length * 100) + '%'"></div>
        </div>
        <p class="mb-progress-label">
            <span x-text="currentIndex + 1"></span> / <span x-text="questions.length"></span>
        </p>
    </div>

    <!-- Question Card -->
    <article class="mb-question-card">
        <h3 class="mb-question-text" x-text="currentQuestion.text_de"></h3>

        <div class="mb-likert-options">
            <template x-for="option in options" :key="option.value">
                <button
                    class="mb-likert-btn"
                    :class="{ 'mb-likert-selected': answers[currentQuestion.id] === option.value }"
                    @click="selectAnswer(option.value)">
                    <span class="mb-likert-emoji" x-text="option.emoji"></span>
                    <span x-text="option.label"></span>
                </button>
            </template>
        </div>
    </article>

    <!-- Navigation -->
    <div class="mb-question-nav">
        <button class="secondary outline" @click="prev()" x-show="currentIndex > 0">
            Zurück
        </button>
        <div x-show="currentIndex === 0"></div>

        <button @click="next()" x-show="currentIndex < questions.length - 1"
                :disabled="!answers[currentQuestion.id]">
            Weiter
        </button>
        <button @click="submitAnswers()" x-show="currentIndex === questions.length - 1"
                :disabled="!isAllAnswered()">
            Abschicken
        </button>
    </div>

    <!-- Hidden form for submission -->
    <form id="answer-form" action="/event/{{ event.id }}/answers" method="post" style="display:none;">
        <template x-for="q in questions" :key="q.id">
            <input type="hidden" :name="'q_' + q.id" :value="answers[q.id] || ''">
        </template>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
function questionnaire() {
    return {
        questions: {{ questions | tojson }},
        currentIndex: 0,
        answers: {},
        options: [
            { value: 1, label: 'Stimme gar nicht zu', emoji: '😟' },
            { value: 2, label: 'Stimme eher nicht zu', emoji: '🙁' },
            { value: 3, label: 'Neutral', emoji: '😐' },
            { value: 4, label: 'Stimme eher zu', emoji: '🙂' },
            { value: 5, label: 'Stimme voll zu', emoji: '😄' },
        ],
        get currentQuestion() {
            return this.questions[this.currentIndex] || {};
        },
        isAllAnswered() {
            return this.questions.every(q => this.answers[q.id]);
        },
        init() {},
        selectAnswer(value) {
            this.answers[this.currentQuestion.id] = value;
            // Auto-advance after short delay
            if (this.currentIndex < this.questions.length - 1) {
                setTimeout(() => this.next(), 300);
            }
        },
        next() {
            if (this.currentIndex < this.questions.length - 1) {
                this.currentIndex++;
            }
        },
        prev() {
            if (this.currentIndex > 0) {
                this.currentIndex--;
            }
        },
        submitAnswers() {
            document.getElementById('answer-form').submit();
        },
    };
}
</script>
{% endblock %}
