{% extends "base.html" %}
{% block title %}Matchbox — Event erstellen{% endblock %}

{% block content %}
<header style="text-align: center; padding: 2rem 0;">
    <h1>Matchbox</h1>
    <p>Bringe deine Community zusammen. Erstelle ein Event und finde die besten Matches.</p>
</header>

<article>
    <h2>Neues Event erstellen</h2>
    <form action="/event/create" method="post">
        <label for="name">Event-Name</label>
        <input type="text" id="name" name="name" placeholder="z.B. Freitagabend Mixer" required>

        <label for="event_type">Event-Typ</label>
        <select id="event_type" name="event_type" required>
            <option value="romantic">Romantisch</option>
            <option value="professional">Professionell / Networking</option>
        </select>

        <label for="description">Beschreibung (optional)</label>
        <textarea id="description" name="description" placeholder="Ein lockerer Abend voller Verbindungen..."></textarea>

        <label for="event_date">Datum</label>
        <input type="date" id="event_date" name="event_date" required>

        <label for="host_name">Dein Name (Host)</label>
        <input type="text" id="host_name" name="host_name" placeholder="Dein Name" required>

        <button type="submit">Event erstellen</button>
    </form>
</article>
{% endblock %}
